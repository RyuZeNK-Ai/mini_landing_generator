<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inkvibe - Tu app de tatuajes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero">
    <!-- Logo arriba del título -->
    <img src="logo.png" alt="Inkvibe Logo" class="logo">

    <h1>Inkvibe - Tu app de tatuajes</h1>
    <p>Descubre artistas, estilos y precios cerca de ti. Conecta, reserva y paga desde la app.</p>

    <form id="waitlist-form">
      <div class="input-container">
        <input type="email" placeholder="Tu correo" required>
      </div>
      <button type="submit">Únete a la waitlist</button>
    </form>

    <div class="socials">
      <a href='https://www.linkedin.com/company/inkvibe-app/'>LinkedIn</a> | <a href='#'>Instagram</a>
    </div>
  </div>
<script>
      const form = document.getElementById('waitlist-form');
      if(form){
        const emailInput = form.querySelector('input[type="email"]');

        // Crear popup
        let popup = document.getElementById('popup');
        if(!popup){
          popup = document.createElement('div');
          popup.id = 'popup';
          popup.textContent = 'Solicitud enviada';
          document.body.appendChild(popup);
        }

        form.addEventListener('submit', function(e){
          e.preventDefault();
          const email = emailInput.value.trim().toLowerCase();
          const validDomains = ['gmail.com', 'hotmail.com', 'yahoo.com'];
          const parts = email.split('@');

          if(parts.length !== 2 || !validDomains.includes(parts[1])){
            alert('Ingresa un correo válido: gmail.com, hotmail.com o yahoo.com');
            return;
          }

          // Mostrar popup
          popup.style.display = 'block';
          setTimeout(() => { popup.style.display = 'none'; }, 2000);

          // Limpiar input
          emailInput.value = '';
        });
      }
    </script></body>
</html>
